name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package.json version v${PKG_VERSION}"
            exit 1
          fi
          echo "Tag ${TAG} matches package.json version v${PKG_VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release check
        run: bun run release:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Test
        run: bun test

      - name: Pack check
        run: bun run pack:check

      - name: Publish to npm
        run: npm publish --access public

      - name: Extract changelog entry for release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " && $0 ~ ver { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
