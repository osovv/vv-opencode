pre-commit:
  parallel: true
  commands:
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    format:
      run: bun run fmt:check
    check-exports:
      run: bun run scripts/check-exports.ts

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit "$1"
